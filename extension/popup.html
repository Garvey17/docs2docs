<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docs to Docs</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; }

        body { width: 320px; background: #ffffff; color: #222; }

        .header {
            background: #1e1e2e;
            padding: 20px 20px 16px;
        }

        .header-inner {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-icon {
            width: 32px;
            height: 32px;
            background: #3b3b52;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-icon i { font-size: 18px; color: #a5b4fc; }

        .header-title { font-size: 15px; font-weight: 600; color: #f1f0ff; }
        .header-sub { font-size: 11px; color: #6b6b8a; margin-top: 1px; }

        .body { padding: 16px 20px; }

        .url-card {
            background: #f9f9f9;
            border: 0.5px solid #e5e5e5;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 16px;
        }

        .url-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
            margin-bottom: 3px;
        }

        .url-row { display: flex; align-items: center; gap: 6px; }
        .url-row i { font-size: 14px; color: #888; }

        #current-url {
            font-size: 13px;
            font-weight: 500;
            color: #222;
            word-break: break-all;
        }

        #generate-btn {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 8px;
            background: #4f46e5;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.15s;
        }

        #generate-btn:hover { opacity: 0.88; }
        #generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #generate-btn i { font-size: 16px; }

        #progress-container { display: none; margin-top: 14px; }

        .progress-track {
            width: 100%;
            height: 4px;
            background: #e5e7eb;
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 35%;
            background: #4f46e5;
            border-radius: 999px;
            animation: slide 1.2s infinite ease-in-out;
        }

        @keyframes slide {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(350%); }
        }

        #status-text {
            font-size: 12px;
            color: #666;
            margin: 8px 0 0;
            text-align: center;
        }

        .state-box {
            display: none;
            margin-top: 14px;
            border-radius: 8px;
            padding: 10px 12px;
            align-items: center;
            gap: 8px;
        }

        .state-box i { font-size: 18px; flex-shrink: 0; }
        .state-box p { font-size: 13px; font-weight: 500; margin: 0; }

        #success-state { background: #f0fdf4; border: 0.5px solid #86efac; }
        #success-state i, #success-state p { color: #15803d; }

        #error-state { background: #fef2f2; border: 0.5px solid #fca5a5; }
        #error-state i, #error-state p { color: #b91c1c; }

        .footer {
            padding: 10px 20px 14px;
            border-top: 0.5px solid #e5e5e5;
        }

        .footer p {
            font-size: 11px;
            color: #999;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-inner">
        <div class="header-icon">
            <i class="ti ti-file-text"></i>
        </div>
        <div>
            <p class="header-title">Docs to Docs</p>
            <p class="header-sub">Documentation guide generator</p>
        </div>
    </div>
</div>

<div class="body">

    <div class="url-card">
        <p class="url-label">Current page</p>
        <div class="url-row">
            <i class="ti ti-world"></i>
            <p id="current-url">Loading...</p>
        </div>
    </div>

    <button id="generate-btn">
        <i class="ti ti-sparkles"></i>
        Generate Guide
    </button>

    <div id="progress-container">
        <div class="progress-track">
            <div class="progress-bar"></div>
        </div>
        <p id="status-text">Generating your guide...</p>
    </div>

    <div id="success-state" class="state-box">
        <i class="ti ti-circle-check"></i>
        <p>Guide downloaded successfully</p>
    </div>

    <div id="error-state" class="state-box">
        <i class="ti ti-alert-circle"></i>
        <p id="error-message">Something went wrong</p>
    </div>

</div>

<div class="footer">
    <p>Generates install, quickstart &amp; features guide</p>
</div>

<script src="popup.js"></script>
</body>
</html>
